spring.application.name=fintrack-backend
server.port=8080

# Database
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/fintrack}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:fintrack_user}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:fintrack_pass}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=${SPRING_JPA_HIBERNATE_DDL_AUTO:update}
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.jdbc.time_zone=UTC

# JWT
jwt.secret=${JWT_SECRET:fintrack-super-secret-jwt-key-2024-change-in-production}
jwt.expiration=${JWT_EXPIRATION:86400000}

# CORS
cors.allowed-origins=http://localhost:3000,http://localhost:5173

# Actuator
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=always

# Logging
logging.level.com.fintrack=DEBUG
logging.level.org.springframework.security=WARN
